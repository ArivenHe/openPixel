services:
  backend:
    image: ${BACKEND_IMAGE}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
    depends_on:
      - redis

  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - "8088:80"
    depends_on:
      - backend

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
